{{ define "title" }}Manage Tags | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 600px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <a href="/admin/posts" style="font-family: var(--mono); font-size: 0.7rem; color: var(--teal); text-decoration: none;">← Back to Posts</a>
        </div>
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            Manage Tags
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">Create and manage tags for blog posts</p>
    </div>

    <!-- Create Tag Form -->
    <div style="background: var(--ink2); border: 1px solid var(--rule); padding: 1.5rem; margin-bottom: 1px;">
        <form action="/admin/tags" method="POST" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            <input type="text" name="name" placeholder="New tag name" required 
                   style="flex: 1; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
            <button type="submit" class="btn-primary" style="cursor: pointer; padding: 0.6rem 1.5rem;">Add Tag →</button>
        </form>
    </div>

    <!-- Existing Tags -->
    <div style="background: var(--ink2); border: 1px solid var(--rule); overflow: hidden;">
        {{ if .Tags }}
        <div>
            {{ range .Tags }}
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid var(--rule);">
                <span style="font-family: var(--cond); font-size: 1rem; font-weight: 600; color: var(--white);">{{ .Name }}</span>
                <form action="/admin/tags/delete/{{ .ID }}" method="POST" style="margin: 0;">
                    <button type="submit" class="btn-ghost" style="color: var(--red); border-color: var(--red); padding: 0.3rem 0.8rem; cursor: pointer;" onclick="return confirm('Delete this tag?')">
                        Delete
                    </button>
                </form>
            </div>
            {{ end }}
        </div>
        {{ else }}
        <div style="padding: 2rem; text-align: center;">
            <div style="font-family: var(--mono); font-size: 2rem; color: var(--white3); margin-bottom: 1rem;">🏷️</div>
            <div style="font-family: var(--cond); font-size: 1.2rem; font-weight: 600; color: var(--white); margin-bottom: 0.5rem;">No tags yet</div>
            <p style="color: var(--white2); font-size: 0.8rem;">Create your first tag above.</p>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
