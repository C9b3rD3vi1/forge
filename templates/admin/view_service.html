{{ define "title" }}{{ .Service.Title }} | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 900px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <a href="/admin/services" style="font-family: var(--mono); font-size: 0.7rem; color: var(--teal); text-decoration: none;">← Back to Services</a>
        </div>
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            View Service
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">View service details</p>
    </div>

    <!-- Service Details Card -->
    <div style="background: var(--ink2); border: 1px solid var(--rule); overflow: hidden;">
        
        <!-- Service Image -->
        {{ if .Service.ImageURL }}
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--rule); text-align: center;">
            <div style="overflow: hidden; border: 1px solid var(--rule); max-width: 100%; display: inline-block;">
                <img src="{{ .Service.ImageURL }}" alt="{{ .Service.Title }}" style="max-width: 100%; height: auto; display: block;">
            </div>
        </div>
        {{ end }}

        <!-- Service Title -->
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--rule);">
            <div style="font-family: var(--mono); font-size: 0.6rem; color: var(--teal); margin-bottom: 0.5rem;">TITLE</div>
            <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white);">{{ .Service.Title }}</div>
        </div>

        <!-- Service Description -->
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--rule);">
            <div style="font-family: var(--mono); font-size: 0.6rem; color: var(--teal); margin-bottom: 0.5rem;">DESCRIPTION</div>
            <div style="font-size: 0.9rem; color: var(--white2); line-height: 1.7;">{{ .Service.Description }}</div>
        </div>

        <!-- Action Buttons -->
        <div style="display: flex; gap: 0.75rem; padding: 1.5rem; justify-content: center; flex-wrap: wrap;">
            <a href="/admin/services/edit/{{ .Service.ID }}" class="btn-primary" style="display: inline-block; padding: 0.6rem 1.5rem;">Edit Service →</a>
            <a href="/admin/services/delete/{{ .Service.ID }}" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem; color: var(--red); border-color: var(--red);" onclick="return confirm('Are you sure you want to delete this service?');">Delete Service</a>
            <a href="/admin/services" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem;">← Back</a>
        </div>
    </div>
</div>
{{ end }}
