{{ define "title" }}Create New Post | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 900px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            Create New Post
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">Write and publish new blog content</p>
    </div>

    <!-- Form -->
    <form action="/admin/posts" method="POST" enctype="multipart/form-data" style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem;">
        
        <!-- Title -->
        <div style="margin-bottom: 1.5rem;">
            <label for="title" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TITLE
            </label>
            <input type="text" id="title" name="title" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Excerpt -->
        <div style="margin-bottom: 1.5rem;">
            <label for="excerpt" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                EXCERPT
            </label>
            <textarea id="excerpt" name="excerpt" rows="3" placeholder="Brief summary for cards and SEO..."
                      style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; resize: vertical;"></textarea>
        </div>

        <!-- Category -->
        <div style="margin-bottom: 1.5rem;">
            <label for="category" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                CATEGORY
            </label>
            <select id="category" name="category"
                    style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
                <option value="general">General</option>
                <option value="backend">Backend</option>
                <option value="security">Security</option>
                <option value="devops">DevOps</option>
                <option value="infrastructure">Infrastructure</option>
            </select>
        </div>

        <!-- Content with Markdown Preview -->
        <div style="margin-bottom: 1.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <label style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em;">
                    CONTENT (Markdown)
                </label>
                <div style="display: flex; gap: 0.25rem;">
                    <button type="button" id="writeTab" class="editor-tab active" onclick="switchTab('write')" style="font-family: var(--mono); font-size: 0.6rem; padding: 0.3rem 0.8rem; background: var(--teal); color: var(--ink); border: none; cursor: pointer;">Write</button>
                    <button type="button" id="previewTab" class="editor-tab" onclick="switchTab('preview')" style="font-family: var(--mono); font-size: 0.6rem; padding: 0.3rem 0.8rem; background: var(--ink); color: var(--white3); border: 1px solid var(--rule); cursor: pointer;">Preview</button>
                </div>
            </div>
            <div id="writePane">
                <textarea id="content" name="content" rows="16" 
                          style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; resize: vertical;"></textarea>
            </div>
            <div id="previewPane" style="display: none; width: 100%; min-height: 300px; background: var(--ink); border: 1px solid var(--rule); padding: 1.5rem; color: var(--white2); font-family: var(--body); font-size: 0.85rem; line-height: 1.7; overflow-y: auto;"></div>
        </div>

        <!-- Tags -->
        <div style="margin-bottom: 1.5rem;">
            <label for="tagInput" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TAGS
            </label>
            <div style="position: relative;">
                <input type="text" id="tagInput" name="tag" placeholder="Select tags..." readonly 
                       style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; cursor: pointer;">
                <ul id="tagDropdown" style="position: absolute; top: 100%; left: 0; right: 0; background: var(--ink2); border: 1px solid var(--rule); max-height: 200px; overflow-y: auto; z-index: 10; display: none; list-style: none; margin: 0; padding: 0.5rem;">
                    {{ range .AllTags }}
                    <li style="padding: 0.25rem 0;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.25rem 0.5rem; font-family: var(--mono); font-size: 0.7rem; color: var(--white2);">
                            <input type="checkbox" data-tag-name="{{ .Name }}" style="accent-color: var(--teal);">
                            {{ .Name }}
                        </label>
                    </li>
                    {{ end }}
                </ul>
            </div>
            <small style="color: var(--white3); font-size: 0.6rem; margin-top: 0.5rem; display: block;">Select multiple tags</small>
        </div>

        <!-- Image -->
        <div style="margin-bottom: 1.5rem;">
            <label for="image" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                FEATURED IMAGE
            </label>
            <input type="file" id="image" name="image" accept="image/*"
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
        </div>

        <!-- Featured & Published Date Row -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.65rem; color: var(--white2); cursor: pointer;">
                    <input type="checkbox" name="featured" id="featured" style="accent-color: var(--teal); width: 16px; height: 16px;">
                    Featured post
                </label>
            </div>
            <div>
                <label for="published_at" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                    PUBLISH DATE
                </label>
                <input type="date" id="published_at" name="published_at"
                       style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
            </div>
        </div>

        <!-- Actions -->
        <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--rule); padding-top: 1.5rem;">
            <a href="/admin/posts" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem;">Cancel</a>
            <button type="submit" class="btn-primary" style="cursor: pointer; padding: 0.6rem 1.5rem;">Save Post →</button>
        </div>
    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script>
    // Tag dropdown
    const tagInput = document.getElementById('tagInput');
    const tagDropdown = document.getElementById('tagDropdown');

    function toggleDropdown() {
        tagDropdown.style.display = tagDropdown.style.display === 'none' ? 'block' : 'none';
    }

    tagInput.addEventListener('click', toggleDropdown);

    const checkboxes = tagDropdown.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(function(cb) {
        cb.addEventListener('change', function() {
            const selected = Array.from(checkboxes)
                .filter(function(chk) { return chk.checked; })
                .map(function(chk) { return chk.getAttribute('data-tag-name'); })
                .join(', ');
            tagInput.value = selected;
        });
    });

    document.addEventListener('click', function(e) {
        if (!tagDropdown.contains(e.target) && e.target !== tagInput) {
            tagDropdown.style.display = 'none';
        }
    });

    // Markdown preview
    function switchTab(tab) {
        const writePane = document.getElementById('writePane');
        const previewPane = document.getElementById('previewPane');
        const writeTab = document.getElementById('writeTab');
        const previewTab = document.getElementById('previewTab');

        if (tab === 'write') {
            writePane.style.display = 'block';
            previewPane.style.display = 'none';
            writeTab.style.background = 'var(--teal)';
            writeTab.style.color = 'var(--ink)';
            previewTab.style.background = 'var(--ink)';
            previewTab.style.color = 'var(--white3)';
        } else {
            writePane.style.display = 'none';
            previewPane.style.display = 'block';
            previewTab.style.background = 'var(--teal)';
            previewTab.style.color = 'var(--ink)';
            writeTab.style.background = 'var(--ink)';
            writeTab.style.color = 'var(--white3)';

            var content = document.getElementById('content').value;
            if (typeof marked !== 'undefined') {
                previewPane.innerHTML = marked.parse(content);
            } else {
                previewPane.textContent = 'Loading preview...';
            }
        }
    }
</script>
{{ end }}
