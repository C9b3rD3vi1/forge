{{ define "title" }}Create New Post | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 900px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            Create New Post
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">Write and publish new blog content</p>
    </div>

    <!-- Form -->
    <form action="/admin/posts" method="POST" enctype="multipart/form-data" style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem;">
        
        <!-- Title -->
        <div style="margin-bottom: 1.5rem;">
            <label for="title" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TITLE
            </label>
            <input type="text" id="title" name="title" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Content -->
        <div style="margin-bottom: 1.5rem;">
            <label for="content" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                CONTENT
            </label>
            <textarea id="content" name="content" rows="12" 
                      style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; resize: vertical;"></textarea>
        </div>

        <!-- Tags -->
        <div style="margin-bottom: 1.5rem;">
            <label for="tagInput" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TAGS
            </label>
            <div style="position: relative;">
                <input type="text" id="tagInput" placeholder="Select tags..." readonly 
                       style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; cursor: pointer;">
                <ul id="tagDropdown" style="position: absolute; top: 100%; left: 0; right: 0; background: var(--ink2); border: 1px solid var(--rule); max-height: 200px; overflow-y: auto; z-index: 10; display: none; list-style: none; margin: 0; padding: 0.5rem;">
                    {{ range .AllTags }}
                    <li style="padding: 0.25rem 0;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.25rem 0.5rem; font-family: var(--mono); font-size: 0.7rem; color: var(--white2);">
                            <input type="checkbox" name="tags" value="{{ .Name }}" style="accent-color: var(--teal);">
                            {{ .Name }}
                        </label>
                    </li>
                    {{ end }}
                </ul>
            </div>
            <small style="color: var(--white3); font-size: 0.6rem; margin-top: 0.5rem; display: block;">Select multiple tags</small>
        </div>

        <!-- Image -->
        <div style="margin-bottom: 2rem;">
            <label for="image" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                IMAGE
            </label>
            <input type="file" id="image" name="image" 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
        </div>

        <!-- Actions -->
        <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--rule); padding-top: 1.5rem;">
            <a href="/admin/posts" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem;">Cancel</a>
            <button type="submit" class="btn-primary" style="cursor: pointer; padding: 0.6rem 1.5rem;">Save Post →</button>
        </div>
    </form>
</div>

<script>
    const tagInput = document.getElementById('tagInput');
    const tagDropdown = document.getElementById('tagDropdown');

    function toggleDropdown() {
        tagDropdown.style.display = tagDropdown.style.display === 'none' ? 'block' : 'none';
    }

    tagInput.addEventListener('click', toggleDropdown);

    const checkboxes = tagDropdown.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            const selected = Array.from(checkboxes)
                .filter(chk => chk.checked)
                .map(chk => chk.value)
                .join(', ');
            tagInput.value = selected;
        });
    });

    document.addEventListener('click', (e) => {
        if (!tagDropdown.contains(e.target) && e.target !== tagInput) {
            tagDropdown.style.display = 'none';
        }
    });
</script>
{{ end }}
