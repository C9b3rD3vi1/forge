{{ define "title" }}Admin Login | Nickson Wekongo{{ end }}

{{ define "content" }}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div style="width: 100%; max-width: 420px;">
        
        <!-- Login Card -->
        <div style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem; position: relative;">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            
            <!-- Header -->
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-family: var(--cond); font-size: 1.8rem; font-weight: 800; color: var(--white); margin-bottom: 0.5rem;">
                    Admin Login
                </div>
                <div style="font-family: var(--mono); font-size: 0.65rem; color: var(--teal);">
                    Access Control Panel
                </div>
            </div>
            
            <!-- Flash Messages -->
            {{ if .Success }}
            <div style="background: rgba(45, 204, 122, 0.1); border: 1px solid var(--green); padding: 0.75rem; margin-bottom: 1.5rem; text-align: center;">
                <span style="font-family: var(--mono); font-size: 0.7rem; color: var(--green);">{{ .Success }}</span>
            </div>
            {{ end }}
            
            {{ if .Error }}
            <div style="background: var(--red-dim); border: 1px solid var(--red); padding: 0.75rem; margin-bottom: 1.5rem; text-align: center;">
                <span style="font-family: var(--mono); font-size: 0.7rem; color: var(--red);">{{ .Error }}</span>
            </div>
            {{ end }}
            
            <!-- Login Form -->
            <form method="POST" action="/admin/login">
                
                <!-- Email -->
                <div style="margin-bottom: 1.25rem;">
                    <label for="email" style="display: block; font-family: var(--mono); font-size: 0.6rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                        EMAIL
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@example.com"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Password -->
                <div style="margin-bottom: 1rem;">
                    <label for="password" style="display: block; font-family: var(--mono); font-size: 0.6rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                        PASSWORD
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="********"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Remember Me -->
                <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember" 
                        style="width: 14px; height: 14px; accent-color: var(--teal);"
                    />
                    <label for="remember" style="font-family: var(--mono); font-size: 0.6rem; color: var(--white3);">
                        Remember me
                    </label>
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="btn-primary" 
                    style="width: 100%; cursor: pointer; padding: 0.75rem;"
                >
                    Login →
                </button>
            </form>
            
            <!-- Footer -->
            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--rule); text-align: center;">
                <span style="font-family: var(--mono); font-size: 0.55rem; color: var(--white3);">
                    © {{ now }} Nickson Wekongo
                </span>
            </div>
        </div>
        
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const alerts = document.querySelectorAll(".alert-success, .alert-error");
        alerts.forEach((alert) => {
            setTimeout(() => {
                alert.style.opacity = "0";
                alert.style.transition = "opacity 0.5s";
                setTimeout(() => alert.remove(), 500);
            }, 4000);
        });
    });
</script>
{{ end }}
