{{ define "title" }}Edit User | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 600px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <a href="/admin/users" style="font-family: var(--mono); font-size: 0.7rem; color: var(--teal); text-decoration: none;">← Back to Users</a>
        </div>
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            Edit User
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">Update user information</p>
    </div>

    <!-- Form -->
    <form method="POST" style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem;">
        
        <!-- Full Name -->
        <div style="margin-bottom: 1.5rem;">
            <label for="name" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                FULL NAME
            </label>
            <input type="text" id="full_name" name="full_name" value="{{ .User.FullName }}" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Email -->
        <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                EMAIL
            </label>
            <input type="email" id="email" name="email" value="{{ .User.Email }}" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Phone -->
        <div style="margin-bottom: 1.5rem;">
            <label for="phone" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                PHONE
            </label>
            <input type="tel" id="phone" name="phone" value="{{ .User.Phone }}" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Address -->
        <div style="margin-bottom: 1.5rem;">
            <label for="address" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                ADDRESS
            </label>
            <input type="text" id="address" name="address" value="{{ .User.Address }}" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Password -->
        <div style="margin-bottom: 1.5rem;">
            <label for="password" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                PASSWORD (leave blank to keep current)
            </label>
            <input type="password" id="password" name="password" 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Admin Checkbox -->
        <div style="margin-bottom: 2rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" name="is_admin" {{ if .User.IsAdmin }}checked{{ end }} style="accent-color: var(--teal);">
                <span style="font-family: var(--mono); font-size: 0.7rem; color: var(--white2);">Admin User</span>
            </label>
        </div>

        <!-- Submit Button -->
        <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--rule); padding-top: 1.5rem;">
            <a href="/admin/users" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem;">Cancel</a>
            <button type="submit" class="btn-primary" style="cursor: pointer; padding: 0.6rem 1.5rem;">Save Changes →</button>
        </div>
    </form>
</div>
{{ end }}
