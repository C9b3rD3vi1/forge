{{ define "title" }}Edit Service | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 800px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <a href="/admin/services" style="font-family: var(--mono); font-size: 0.7rem; color: var(--teal); text-decoration: none;">← Back to Services</a>
        </div>
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            Edit Service
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">Update service information</p>
    </div>

    <!-- Error Message -->
    {{ if .Error }}
    <div style="background: var(--red-dim); border: 1px solid var(--red); padding: 0.75rem 1rem; margin-bottom: 1.5rem; color: var(--red); font-family: var(--mono); font-size: 0.8rem;">
        {{ .Error }}
    </div>
    {{ end }}

    <!-- Form -->
    <form method="POST" action="/admin/services/edit/{{ .Service.ID }}" style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem;">
        
        <!-- Title -->
        <div style="margin-bottom: 1.5rem;">
            <label for="title" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TITLE
            </label>
            <input type="text" id="title" name="title" value="{{ .Service.Title }}" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Description -->
        <div style="margin-bottom: 1.5rem;">
            <label for="description" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                DESCRIPTION
            </label>
            <textarea id="description" name="description" rows="6" required 
                      style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; resize: vertical;">{{ .Service.Description }}</textarea>
        </div>

        <!-- Image URL -->
        <div style="margin-bottom: 2rem;">
            <label for="image" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                IMAGE URL
            </label>
            <input type="text" id="image" name="image" value="{{ .Service.ImageURL }}" 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
        </div>

        <!-- Submit Button -->
        <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--rule); padding-top: 1.5rem;">
            <a href="/admin/services" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem;">Cancel</a>
            <button type="submit" class="btn-primary" style="cursor: pointer; padding: 0.6rem 1.5rem;">Update Service →</button>
        </div>
    </form>
</div>
{{ end }}
