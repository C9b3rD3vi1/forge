{{ define "title" }}Edit Post | Admin Panel{{ end }}

{{ define "content" }}
<div style="max-width: 900px; margin: 0 auto;">
    
    <!-- Header -->
    <div style="margin-bottom: 2rem;">
        <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
            Edit Post
        </div>
        <p style="color: var(--white2); font-size: 0.8rem;">Update your blog content</p>
    </div>

    <!-- Error Message -->
    {{ if .Error }}
    <div style="background: var(--red-dim); border: 1px solid var(--red); padding: 0.75rem 1rem; margin-bottom: 1.5rem; color: var(--red); font-family: var(--mono); font-size: 0.8rem;">
        {{ .Error }}
    </div>
    {{ end }}

    <!-- Form -->
    <form action="/admin/posts/update/{{ .Post.ID }}/" method="POST" enctype="multipart/form-data" style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem;">
        
        <!-- Title -->
        <div style="margin-bottom: 1.5rem;">
            <label for="title" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TITLE
            </label>
            <input type="text" id="title" name="title" value="{{ .Post.Title }}" required 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.9rem;">
        </div>

        <!-- Content -->
        <div style="margin-bottom: 1.5rem;">
            <label for="content" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                CONTENT
            </label>
            <textarea id="content" name="content" rows="12" 
                      style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; resize: vertical;">{{ .Post.Content }}</textarea>
        </div>

        <!-- Tags -->
        <div style="margin-bottom: 1.5rem;">
            <label for="tags" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                TAGS (comma-separated)
            </label>
            <input type="text" id="tags" name="tags" value="{{ .Post.Tags }}" 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
        </div>

        <!-- Current Image -->
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                CURRENT IMAGE
            </label>
            <div style="margin-bottom: 1rem;">
                {{ if .Post.ImageURL }}
                <div style="overflow: hidden; border: 1px solid var(--rule); max-width: 200px;">
                    <img src="{{ .Post.ImageURL }}" alt="Post Image" style="width: 100%; height: auto; display: block;">
                </div>
                {{ else }}
                <p style="color: var(--white3); font-size: 0.8rem;">No image uploaded.</p>
                {{ end }}
            </div>
            
            <label for="image" style="display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--teal); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                UPLOAD NEW IMAGE
            </label>
            <input type="file" id="image" name="image" 
                   style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem;">
        </div>

        <!-- Actions -->
        <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--rule); padding-top: 1.5rem;">
            <a href="/admin/posts" class="btn-ghost" style="display: inline-block; padding: 0.6rem 1.5rem;">Cancel</a>
            <button type="submit" class="btn-primary" style="cursor: pointer; padding: 0.6rem 1.5rem;">Update Post →</button>
        </div>
    </form>
</div>
{{ end }}
