<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Subject}}</title>
<style>
  body{margin:0;padding:0;background:#080c10;font-family:'Helvetica Neue',Arial,sans-serif;}
  .container{max-width:600px;margin:0 auto;padding:20px;}
  .header{background:#111820;border-bottom:2px solid #00c9b1;padding:24px 32px;text-align:center;}
  .header h1{margin:0;font-size:22px;font-weight:800;color:#e8f0f8;letter-spacing:2px;text-transform:uppercase;}
  .header span{color:#00c9b1;}
  .body{background:#111820;padding:32px;color:#c8d0d8;font-size:14px;line-height:1.7;}
  .body h2{color:#e8f0f8;font-size:18px;margin:0 0 16px;}
  .body p{margin:0 0 12px;}
  .quote{border-left:3px solid #00c9b1;background:#0d141c;padding:12px 16px;margin:16px 0;font-style:italic;color:#9aacba;}
  .btn{display:inline-block;background:#00c9b1;color:#080c10;text-decoration:none;padding:10px 24px;font-size:13px;font-weight:700;margin:8px 0;}
  .footer{background:#0d141c;border-top:1px solid #1e2e3e;padding:24px 32px;text-align:center;font-size:11px;color:#5a6a7a;}
  .footer a{color:#00c9b1;text-decoration:none;}
  .footer img{border-radius:50%;width:64px;height:64px;object-fit:cover;border:2px solid #1e2e3e;margin-bottom:8px;}
  .footer .name{color:#e8f0f8;font-size:14px;font-weight:700;margin-bottom:2px;}
  .footer .brand{color:#00c9b1;font-size:12px;font-weight:600;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>N.<span>WEKONGO</span></h1>
  </div>
  <div class="body">
    {{template "content" .}}
  </div>
  <div class="footer">
    <img src="{{.SiteURL}}/static/me/me.jpeg" alt="Nickson Wekongo">
    <div class="name">Nickson Wekongo</div>
    <div class="brand">Forge.Hub</div>
    <p style="margin-top:8px;">© {{.Year}} Forge.Hub. All rights reserved.</p>
    <p><a href="{{.SiteURL}}">{{.SiteURL}}</a></p>
  </div>
</div>
</body>
</html>
