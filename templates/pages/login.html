{{ block "content" .}}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div style="width: 100%; max-width: 440px;">
        
        <!-- Login Card -->
        <div style="background: var(--ink2); border: 1px solid var(--rule); padding: 2rem; position: relative;">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            
            <!-- Header -->
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-family: var(--cond); font-size: 1.8rem; font-weight: 800; color: var(--white); margin-bottom: 0.5rem;">
                    Welcome Back
                </div>
                <div style="font-family: var(--mono); font-size: 0.7rem; color: var(--white3);">
                    Sign in to your account
                </div>
            </div>
            
            <!-- Login Form -->
            <form method="POST" action="/login">
                
                <!-- Email Field -->
                <div style="margin-bottom: 1.25rem;">
                    <label style="display: block; font-family: var(--mono); font-size: 0.6rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.5rem;">
                        EMAIL
                    </label>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="user@example.com"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Password Field -->
                <div style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="font-family: var(--mono); font-size: 0.6rem; color: var(--white3); letter-spacing: 0.1em;">
                            PASSWORD
                        </label>
                        <a href="/forgot-password" style="font-family: var(--mono); font-size: 0.55rem; color: var(--teal); text-decoration: none;">
                            Forgot?
                        </a>
                    </div>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="••••••••"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.75rem 1rem; color: var(--white); font-family: var(--body); font-size: 0.85rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Remember Me -->
                <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input 
                        type="checkbox" 
                        name="remember" 
                        id="remember"
                        style="width: 14px; height: 14px; accent-color: var(--teal);"
                    />
                    <label for="remember" style="font-family: var(--mono); font-size: 0.6rem; color: var(--white3);">
                        Remember this device
                    </label>
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="btn-primary" 
                    style="width: 100%; cursor: pointer;"
                >
                    Sign In →
                </button>
            </form>
            
            <!-- Divider -->
            <div style="display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;">
                <div style="flex: 1; height: 1px; background: var(--rule);"></div>
                <span style="font-family: var(--mono); font-size: 0.6rem; color: var(--white3);">OR</span>
                <div style="flex: 1; height: 1px; background: var(--rule);"></div>
            </div>
            
            <!-- Social Login -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;">
                <button type="button" class="btn-ghost" style="cursor: pointer; text-align: center;">
                    GitHub
                </button>
                <button type="button" class="btn-ghost" style="cursor: pointer; text-align: center;">
                    SSO
                </button>
            </div>
            
            <!-- Register Link -->
            <div style="text-align: center; border-top: 1px solid var(--rule); padding-top: 1.25rem;">
                <span style="font-family: var(--mono); font-size: 0.6rem; color: var(--white3);">
                    Don't have an account?
                </span>
                <a href="/register" style="font-family: var(--mono); font-size: 0.6rem; color: var(--teal); text-decoration: none; margin-left: 0.25rem;">
                    Create account →
                </a>
            </div>
        </div>
        
        <!-- Security Notice -->
        <div style="text-align: center; margin-top: 1rem;">
            <span style="font-family: var(--mono); font-size: 0.55rem; color: var(--white3);">
                🔒 Your data is encrypted and secure
            </span>
        </div>
        
    </div>
</div>
{{ end }}
