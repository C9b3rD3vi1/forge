{{ block "content" .}}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;">
    <div style="width: 100%; max-width: 440px;">
        
        <!-- Register Card -->
        <div style="background: var(--ink2); border: 1px solid var(--rule); padding: 1.5rem; position: relative;">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            
            <!-- Header -->
            <div style="text-align: center; margin-bottom: 1.25rem;">
                <div style="font-family: var(--cond); font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.25rem;">
                    Create Account
                </div>
                <div style="font-family: var(--mono); font-size: 0.6rem; color: var(--white3);">
                    Join the community
                </div>
            </div>
            
            <!-- Error Alert -->
            {{ if .error }}
            <div style="background: var(--red-dim); border: 1px solid var(--red); padding: 0.5rem; margin-bottom: 1rem; text-align: center;">
                <span style="font-family: var(--mono); font-size: 0.65rem; color: var(--red);">{{ .error }}</span>
            </div>
            {{ end }}
            
            <!-- Registration Form -->
            <form method="POST" action="/register">
                
                <!-- Full Name -->
                <div style="margin-bottom: 0.75rem;">
                    <label style="display: block; font-family: var(--mono); font-size: 0.55rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.35rem;">
                        FULL NAME
                    </label>
                    <input 
                        type="text" 
                        name="fullname" 
                        placeholder="John Doe"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 0.8rem; color: var(--white); font-family: var(--body); font-size: 0.8rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Username -->
                <div style="margin-bottom: 0.75rem;">
                    <label style="display: block; font-family: var(--mono); font-size: 0.55rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.35rem;">
                        USERNAME
                    </label>
                    <input 
                        type="text" 
                        name="username" 
                        placeholder="johndoe"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 0.8rem; color: var(--white); font-family: var(--body); font-size: 0.8rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Email -->
                <div style="margin-bottom: 0.75rem;">
                    <label style="display: block; font-family: var(--mono); font-size: 0.55rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.35rem;">
                        EMAIL
                    </label>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="user@example.com"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 0.8rem; color: var(--white); font-family: var(--body); font-size: 0.8rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Password -->
                <div style="margin-bottom: 0.35rem;">
                    <label style="display: block; font-family: var(--mono); font-size: 0.55rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.35rem;">
                        PASSWORD
                    </label>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="••••••••"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 0.8rem; color: var(--white); font-family: var(--body); font-size: 0.8rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                <div style="font-family: var(--mono); font-size: 0.5rem; color: var(--white3); margin-bottom: 0.75rem;">
                    8+ characters with letters, numbers & symbols
                </div>
                
                <!-- Confirm Password -->
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-family: var(--mono); font-size: 0.55rem; color: var(--white3); letter-spacing: 0.1em; margin-bottom: 0.35rem;">
                        CONFIRM PASSWORD
                    </label>
                    <input 
                        type="password" 
                        name="password_confirm" 
                        placeholder="••••••••"
                        style="width: 100%; background: var(--ink); border: 1px solid var(--rule); padding: 0.6rem 0.8rem; color: var(--white); font-family: var(--body); font-size: 0.8rem; transition: border-color 0.15s;"
                        onfocus="this.style.borderColor='var(--teal)'" 
                        onblur="this.style.borderColor='var(--rule)'"
                        required
                    />
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="btn-primary" 
                    style="width: 100%; cursor: pointer; padding: 0.6rem; font-size: 0.7rem;"
                >
                    Create Account →
                </button>
            </form>
            
            <!-- Divider -->
            <div style="display: flex; align-items: center; gap: 1rem; margin: 1rem 0;">
                <div style="flex: 1; height: 1px; background: var(--rule);"></div>
                <span style="font-family: var(--mono); font-size: 0.55rem; color: var(--white3);">OR</span>
                <div style="flex: 1; height: 1px; background: var(--rule);"></div>
            </div>
            
            <!-- Login Link -->
            <div style="text-align: center;">
                <span style="font-family: var(--mono); font-size: 0.55rem; color: var(--white3);">
                    Already have an account?
                </span>
                <a href="/login" style="font-family: var(--mono); font-size: 0.55rem; color: var(--teal); text-decoration: none; margin-left: 0.25rem;">
                    Sign in →
                </a>
            </div>
            
            <!-- Security Note -->
            <div style="margin-top: 1rem; padding: 0.6rem; background: var(--ink); border: 1px solid var(--rule);">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-family: var(--mono); font-size: 0.8rem; color: var(--teal);">🔒</span>
                    <p style="font-family: var(--mono); font-size: 0.55rem; color: var(--white3);">
                        Your data is encrypted and secure
                    </p>
                </div>
            </div>
        </div>
        
    </div>
</div>
{{ end }}
