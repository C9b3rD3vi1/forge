<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Forge.Hub</title>
    
    <!-- favicon -->
    <link rel="icon" type="image/png" href="/static/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/static/site.webmanifest" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ink: #080c10;
            --ink2: #111820;
            --ink3: #1c2630;
            --mid: #5a6a7a;
            --faint: #9aacba;
            --rule: #1e2e3e;
            --rule2: #162030;
            --paper: #060c14;
            --teal: #00c9b1;
            --teal2: #00a693;
            --teal-glow: rgba(0, 201, 177, 0.08);
            --teal-line: rgba(0, 201, 177, 0.25);
            --green: #2dcc7a;
            --white: #e8f0f8;
            --white2: rgba(232, 240, 248, 0.6);
            --white3: rgba(232, 240, 248, 0.25);
            --mono: 'IBM Plex Mono', monospace;
            --cond: 'Barlow Condensed', sans-serif;
            --body: 'Barlow', sans-serif;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { font-size: 16px; }
        body {
            font-family: var(--body);
            font-size: 0.95rem;
            background: var(--paper);
            color: var(--white);
            min-height: 100vh;
        }

        /* Layout */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--ink2);
            border-right: 1px solid var(--rule);
            overflow-y: auto;
            z-index: 40;
        }

        /* Main Content */
        .admin-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 2rem;
        }

        /* Nav Items */
        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.6rem 0.75rem;
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--white3);
            text-decoration: none;
            transition: all 0.15s ease;
            margin-bottom: 0.25rem;
        }

        .nav-item:hover {
            background: var(--teal-glow);
            color: var(--teal);
        }

        .nav-item.active {
            background: var(--teal-glow);
            color: var(--teal);
            border-left: 2px solid var(--teal);
        }

        /* Scrollbar */
        .admin-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        
        .admin-sidebar::-webkit-scrollbar-track {
            background: var(--rule);
        }
        
        .admin-sidebar::-webkit-scrollbar-thumb {
            background: var(--teal);
        }

        /* Hamburger button (mobile only) */
        .admin-hamburger {
            display: none;
            background: transparent;
            border: none;
            color: var(--white);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            font-family: var(--mono);
        }
        .admin-hamburger:hover {
            color: var(--teal);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .admin-sidebar.active {
                transform: translateX(0);
            }
            .admin-content {
                margin-left: 0;
                padding: 1rem;
            }
            .admin-hamburger-wrap {
                display: flex !important;
                align-items: center;
                padding: 0.5rem;
            }
            .admin-hamburger {
                display: flex;
                align-items: center;
            }
        }

        /* Status dot */
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45, 204, 122, 0.5); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(45, 204, 122, 0); }
        }
    </style>
</head>
<body class="admin-layout">

    <!-- Sidebar -->
    <aside id="sidebar" class="admin-sidebar">
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--rule);">
            <div style="font-family: var(--cond); font-size: 1.3rem; font-weight: 800; color: var(--white);">
                N.<span style="color: var(--teal);">WEKONGO</span>
            </div>
            <div style="font-family: var(--mono); font-size: 0.75rem; color: var(--white3); margin-top: 0.25rem;">
                Admin Console
            </div>
        </div>

        <nav style="padding: 1rem 0.75rem;">
            <a href="/admin/dashboard" class="nav-item">
                → Dashboard
            </a>
            <a href="/admin/posts" class="nav-item">
                → Posts
            </a>
            <a href="/admin/projects" class="nav-item">
                → Projects
            </a>
            <a href="/admin/services" class="nav-item">
                → Services
            </a>
            <a href="/admin/techstacks" class="nav-item">
                → Tech Stacks
            </a>
            <a href="/admin/tags" class="nav-item">
                → Tags
            </a>
            <a href="/admin/users" class="nav-item">
                → Users
            </a>
            <a href="/admin/contacts" class="nav-item">
                → Messages
            </a>
            <a href="/admin/settings" class="nav-item">
                → Settings
            </a>
        </nav>

        <div style="margin-top: auto; padding: 1rem; border-top: 1px solid var(--rule); margin: 2rem 0.75rem 0.75rem;">
            <div style="font-family: var(--mono); font-size: 0.75rem; color: var(--teal); letter-spacing: 0.1em;">SYSTEM STATUS</div>
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                <span class="status-dot"></span>
                <span style="font-family: var(--mono); font-size: 0.75rem; color: var(--white3);">All systems operational</span>
            </div>
            <a href="/admin/logout" class="nav-item" style="margin-top: 1rem; border-top: 1px solid var(--rule); padding-top: 1rem;">
                ← Logout
            </a>
        </div>
    </aside>

    <!-- Hamburger (visible on mobile) -->
    <div style="position: sticky; top: 0; z-index: 50; background: var(--paper); border-bottom: 1px solid var(--rule); display: none;" class="admin-hamburger-wrap">
        <button class="admin-hamburger" onclick="toggleSidebar()" aria-label="Toggle navigation">☰</button>
    </div>

    <!-- Main Content -->
    <main class="admin-content">
        {{ block "content" . }}{{ end }}
    </main>

    <script>
        // Set active nav item based on URL
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.getAttribute('href') === window.location.pathname) {
                item.classList.add('active');
            }
        });

        // Mobile sidebar toggle (optional - add a hamburger button in child templates if needed)
        const sidebar = document.getElementById('sidebar');
        window.toggleSidebar = function() {
            sidebar.classList.toggle('active');
        };
    </script>
</body>
</html>
